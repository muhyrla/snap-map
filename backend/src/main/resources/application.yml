spring:
  application:
    name: snap-map-backend
  
  datasource:
    # Railway даёт PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:snap-map}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    template:
      routing-key: ${RABBITMQ_ROUTING_KEY:moderation.tasks}
      exchange: ${RABBITMQ_EXCHANGE:moderation.exchange}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.snapmap: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

cors:
  # Список разрешённых origin через запятую. В проде задаётся через CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

telegram:
  bot-token: ${SNAP_MAP_BOT_TOKEN:}

s3:
  endpoint: ${S3_ENDPOINT:http://127.0.0.1:9000}
  region: ${S3_REGION:us-east-1}
  accessKey: ${S3_ACCESS_KEY:minioadmin}
  secretKey: ${S3_SECRET_KEY:minioadmin}
  bucket: ${S3_BUCKET:snapmap}
  # Публичный базовый URL для отображения загруженных фото (лента). По умолчанию = endpoint.
  publicEndpoint: ${S3_PUBLIC_ENDPOINT:}

redis:
  # Railway даёт REDISHOST/REDISPORT/REDISPASSWORD
  host: ${REDISHOST:${REDIS_HOST:127.0.0.1}}
  port: ${REDISPORT:${REDIS_PORT:6379}}
  password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
  database: ${REDIS_DATABASE:0}
  queue-key: ${REDIS_QUEUE_KEY:moderation:queue}
  status-key-prefix: ${REDIS_STATUS_KEY_PREFIX:moderation:status}
  result-key-prefix: ${REDIS_RESULT_KEY_PREFIX:moderation:result}
  events-topic: ${REDIS_EVENTS_TOPIC:moderation:events}
  task-ttl-seconds: ${REDIS_TASK_TTL_SECONDS:86400}

---
# Профиль h2 для разработки (опционально)
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:snapmapdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

